<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${task.id != null ? 'Edit Task' : 'New Task'}">Task Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" th:href="@{/}">📋 Task Manager</a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="main-card col-lg-8 mx-auto">
            <h4 class="mb-4" th:text="${task.id != null ? 'Edit Task' : 'Create New Task'}"></h4>
            
            <form th:action="${task.id != null} ? @{/update/{id}(id=${task.id})} : @{/}" 
                  th:object="${task}" method="post" novalidate>
                
                <div class="mb-3">
                    <label for="title" class="form-label fw-medium">Title</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label fw-medium">Description</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="3"></textarea>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="status" class="form-label fw-medium">Status</label>
                        <select id="status" th:field="*{status}" class="form-select">
                            <option value="TODO">To Do</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="DONE">Done</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="dueDate" class="form-label fw-medium">Due Date</label>
                        <input type="date" id="dueDate" th:field="*{dueDate}" class="form-control">
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4" th:text="${task.id != null ? 'Update Task' : 'Save Task'}"></button>
                    <a th:href="@{/}" class="btn btn-outline-secondary px-4">Back</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
