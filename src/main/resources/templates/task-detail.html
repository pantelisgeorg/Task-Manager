<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Task: ' + ${task.title}">Task Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" th:href="@{/}">📋 Task Manager</a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="main-card col-lg-8 mx-auto">
            <div class="d-flex justify-content-between align-items-start mb-4">
                <h4 class="mb-0" th:text="${task.title}"></h4>
                <span class="status-badge" th:classappend="${' status-' + task.status}" th:text="${task.status}"></span>
            </div>

            <div th:if="${task.description != null}" class="mb-4">
                <label class="form-label fw-medium text-muted">Description</label>
                <div class="task-description" th:text="${task.description}"></div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-medium text-muted">Due Date</label>
                    <div th:text="${task.dueDate != null ? #temporals.format(task.dueDate, 'dd MMM yyyy') : 'No due date'}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium text-muted">Created</label>
                    <div th:text="${task.createdAt != null ? #temporals.format(task.createdAt, 'dd MMM yyyy HH:mm') : '-'}"></div>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <a th:href="@{/edit/{id}(id=${task.id})}" class="btn btn-primary px-4">Edit</a>
                <form th:action="@{/toggle-status/{id}(id=${task.id})}" method="post">
                    <button type="submit" class="btn btn-outline-success px-4" th:text="${task.status == 'DONE' ? 'Undo' : 'Mark Done'}"></button>
                </form>
                <form th:action="@{/delete/{id}(id=${task.id})}" method="post" onsubmit="return confirm('Delete this task?');">
                    <button type="submit" class="btn btn-outline-danger px-4">Delete</button>
                </form>
                <a th:href="@{/}" class="btn btn-outline-secondary px-4">Back</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
